; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
; Gera include/pio_test_guard.h antes de qualquer build (ver emu/gen_test_guard.py).
; Necessário mesmo aqui porque src/main.cpp inclui esse header em todos os envs.
extra_scripts = pre:emu/gen_test_guard.py
lib_deps =
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    tzapu/WiFiManager
    adafruit/Adafruit_VL53L0X
    rweather/Crypto
    bblanchon/ArduinoJson@^7
    ricmoo/QRCode

[env:qemu]
extends = env:esp32doit-devkit-v1
framework = arduino, espidf
build_flags =
    -DQEMU_EMULATOR
    -DTELEMETRY_INTERVAL_MS=10000
    -Wno-error=maybe-uninitialized
    -Wno-error=unknown-pragmas
test_framework = unity
test_build_src = yes
; `pio test` sempre roda o estágio de "upload" para plataformas embarcadas,
; mesmo com test_testing_command configurado (ele só troca o leitor de saída
; do estágio de teste, não pula o de upload). Não há hardware real aqui, então
; o upload vira um no-op; quem sobe o firmware de teste é o próprio
; test_testing_command (via emu/qemu-test-runner.sh).
upload_protocol = custom
upload_command = true
test_testing_command =
    bash
    ${platformio.workspace_dir}/../emu/qemu-test-runner.sh
    ${platformio.build_dir}/${this.__env__}
